<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Distribusi AR — Panduan Instalasi 3D Material PLN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Work+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --primary:#FFE000;
  --primary-dark:#C4AB00;
  --primary-light:#FFF4A3;
  --secondary:#00AEEF;
  --secondary-dark:#0088C2;
  --secondary-light:#B3E5FC;
  --tertiary:#E3000B;
  --tertiary-dark:#B00008;
  --neutral:#F2F4F7;
  --neutral-dim:#DFE3EA;
  /* legacy aliases */
  --blue-950:#1A1A2E;
  --blue-900:#2D2D44;
  --blue-800:#3E3E5C;
  --blue-700:#00AEEF;
  --blue-600:#00AEEF;
  --blue-500:#33C1F5;
  --blue-100:#E8F7FE;
  --yellow:#FFE000;
  --yellow-dark:#C4AB00;
  --amber:#F2870D;
  --red:#E3000B;
  --ink:#1A1A2E;
  --ink-soft:#5A5A72;
  --paper:#F2F4F7;
  --paper-dim:#DFE3EA;
  --white:#FFFFFF;
  --line: rgba(26,26,46,0.10);
  --shell-w: 460px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Work Sans',sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 20% 0%, rgba(46,125,201,.25), transparent 55%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0 1px, transparent 1px 42px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.035) 0 1px, transparent 1px 42px),
    var(--blue-950);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:28px 14px;
}
.brand-back{
  position:fixed; inset:0; z-index:-1;
}
#shell{
  width:100%;
  max-width:var(--shell-w);
  background:var(--paper);
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.06);
  display:flex;
  flex-direction:column;
  height:min(880px, calc(100vh - 56px));
  position:relative;
}
/* ---------- topbar ---------- */
#topbar{
  flex:0 0 auto;
  background:var(--blue-900);
  color:var(--white);
  padding:16px 16px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  position:relative;
  z-index:5;
}
#topbar .back-btn{
  width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;
  color:var(--white);
}
#topbar .back-btn svg{width:18px;height:18px;}
#topbar .logo-badge{
  width:34px;height:34px;border-radius:50%;background:var(--blue-600);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.15);
}
#topbar .logo-badge svg{width:19px;height:19px;}
#topbar .title-block{flex:1 1 auto; min-width:0;}
#topbar .eyebrow{
  font-family:'Space Grotesk',sans-serif; font-size:10px; letter-spacing:.09em;
  color:var(--primary); text-transform:uppercase; opacity:.9;
}
#topbar h1{
  font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:20px;
  margin:0; line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#topbar .top-action{
  width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12); display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;flex:0 0 auto;
}
#topbar .top-action svg{width:17px;height:17px;}

/* ---------- screen ---------- */
#screen{
  flex:1 1 auto;
  overflow-y:auto;
  overflow-x:hidden;
  background:var(--paper);
  -webkit-overflow-scrolling:touch;
  position:relative;
}
#screen::-webkit-scrollbar{width:0;}

/* ---------- bottom nav ---------- */
#bottomnav{
  flex:0 0 auto;
  display:flex;
  background:var(--white);
  border-top:1px solid var(--line);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  position:relative; z-index:5;
}
.nav-btn{
  flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 2px; cursor:pointer; color:#9AA9B6; font-family:'Work Sans',sans-serif; font-size:10.5px; font-weight:600;
}
.nav-btn svg{width:21px;height:21px;}
.nav-btn.active{color:var(--blue-700);}
.nav-btn .dot{
  width:4px;height:4px;border-radius:50%;background:var(--primary); margin-top:-1px;
  opacity:0; transform:scale(0);
  transition:all .18s ease;
}
.nav-btn.active .dot{opacity:1; transform:scale(1);}

/* ---------- generic pieces ---------- */
.px{padding-left:18px;padding-right:18px;}
.section-title{
  font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:19px; color:var(--blue-900);
  margin:0 0 12px; letter-spacing:.01em;
}
.section-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
.section-row .section-title{margin-bottom:0;}
.link-more{font-size:12px;font-weight:700;color:var(--secondary);text-decoration:none;font-family:'Work Sans';cursor:pointer;}

/* search */
.search-bar{
  display:flex;align-items:center;gap:10px;background:var(--white);
  border:1.5px solid var(--line); border-radius:14px; padding:12px 14px; margin:16px 18px 6px;
}
.search-bar svg{width:18px;height:18px;color:var(--ink-soft);flex:0 0 auto;}
.search-bar input{
  border:none;outline:none;flex:1;font-family:'Work Sans';font-size:14px;color:var(--ink);background:transparent;
}
.search-bar input::placeholder{color:#9AA9B6;font-weight:500;}

/* hero */
.hero-wrap{margin:14px 18px 22px; border-radius:22px; overflow:hidden; position:relative;
  background:
    radial-gradient(circle at 75% 15%, rgba(46,125,201,.55), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.06) 0 1px, transparent 1px 28px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 28px),
    linear-gradient(160deg, var(--blue-800), var(--blue-950));
}
.hero-canvas-holder{width:100%;height:200px;position:relative;touch-action:none;}
.hero-canvas-holder canvas{display:block;width:100%!important;height:100%!important;}
.hero-drag-hint{
  position:absolute; left:14px; bottom:12px; display:flex; align-items:center; gap:6px;
  font-family:'Space Grotesk'; font-size:10px; color:rgba(255,255,255,.75); letter-spacing:.03em;
}
.hero-drag-hint svg{width:13px;height:13px;}
.hero-text{padding:2px 18px 20px;}
.hero-eyebrow{font-family:'Space Grotesk';font-size:10.5px;letter-spacing:.1em;color:var(--primary);text-transform:uppercase;font-weight:600;}
.hero-title{font-family:'Hanken Grotesk';font-weight:800;font-size:26px;color:#fff;line-height:1.05;margin:6px 0 8px;}
.hero-sub{font-size:12.5px;color:rgba(255,255,255,.72);line-height:1.5;margin:0 0 16px;max-width:34ch;}
.hero-chips{display:flex;gap:8px;flex-wrap:wrap;}
.hero-chip{
  display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16); color:#fff; font-size:10.5px; font-weight:600;
  padding:7px 10px; border-radius:100px;
}
.hero-chip svg{width:13px;height:13px;color:var(--primary);}

/* category grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:0 18px 22px;}
.cat-card{
  background:var(--white); border-radius:16px; padding:14px; cursor:pointer;
  border:1px solid var(--line); transition:transform .12s ease;
  display:flex; flex-direction:column; gap:10px;
}
.cat-card:active{transform:scale(.97);}
.cat-icon{
  width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
}
.cat-icon svg{width:20px;height:20px;}
.cat-card h3{font-family:'Hanken Grotesk';font-size:16px;font-weight:700;margin:0;color:var(--blue-900);line-height:1.15;}
.cat-card p{font-size:11px;color:var(--ink-soft);margin:0;line-height:1.4;}
.cat-count{font-family:'Space Grotesk';font-size:10px;color:var(--secondary);font-weight:600;}

/* continue learning card */
.continue-card{
  margin:0 18px 24px; background:var(--white); border:1px solid var(--line); border-radius:18px;
  padding:14px; display:flex; gap:12px; align-items:center; cursor:pointer;
}
.continue-thumb{
  width:56px;height:56px;border-radius:13px;flex:0 0 auto;
  background:linear-gradient(150deg,var(--blue-700),var(--blue-900));
  display:flex;align-items:center;justify-content:center;
}
.continue-thumb svg{width:26px;height:26px;color:var(--primary);}
.continue-body{flex:1;min-width:0;}
.continue-body .lbl{font-size:10px;font-weight:700;color:var(--secondary);text-transform:uppercase;letter-spacing:.04em;font-family:'Space Grotesk';}
.continue-body h4{font-family:'Hanken Grotesk';font-size:16px;margin:3px 0 6px;color:var(--blue-900);}
.progress-track{height:6px;border-radius:6px;background:var(--paper-dim);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--secondary),var(--primary));border-radius:6px;}
.continue-pct{font-family:'Space Grotesk';font-size:11px;color:var(--ink-soft);margin-top:5px;}
.continue-arrow{flex:0 0 auto;color:var(--secondary);}
.continue-arrow svg{width:18px;height:18px;}

/* filter chips */
.chip-row{display:flex; gap:8px; overflow-x:auto; padding:16px 18px 4px; scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.filter-chip{
  flex:0 0 auto; padding:8px 14px; border-radius:100px; border:1.5px solid var(--line); background:var(--white);
  font-size:12.5px; font-weight:700; color:var(--ink-soft); cursor:pointer; white-space:nowrap; font-family:'Work Sans';
}
.filter-chip.active{background:var(--blue-900); border-color:var(--blue-900); color:#fff;}

/* item grid (catalog) */
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 18px 26px;}
.item-card{
  background:var(--white); border:1px solid var(--line); border-radius:16px; overflow:hidden; cursor:pointer;
}
.item-thumb{
  height:96px; position:relative; display:flex;align-items:center;justify-content:center;
  background:
    repeating-linear-gradient(0deg, rgba(20,60,95,.06) 0 1px, transparent 1px 12px),
    repeating-linear-gradient(90deg, rgba(20,60,95,.06) 0 1px, transparent 1px 12px),
    var(--blue-100);
}
.item-thumb svg{width:38px;height:38px;}
.badge-3d{
  position:absolute; top:7px; right:7px; background:var(--blue-900); color:var(--primary);
  font-family:'Space Grotesk'; font-size:8.5px; font-weight:600; padding:3px 6px; border-radius:6px; letter-spacing:.03em;
}
.badge-level{
  position:absolute; top:7px; left:7px; font-family:'Space Grotesk'; font-size:8.5px; font-weight:700;
  padding:3px 6px; border-radius:6px; letter-spacing:.02em;
}
.lvl-TM{background:var(--secondary);color:#fff;}
.lvl-TR{background:var(--amber);color:#fff;}
.lvl-mix{background:var(--ink);color:#fff;}
.item-info{padding:10px 11px 12px;}
.item-info h4{font-family:'Hanken Grotesk';font-size:14.5px;font-weight:700;margin:0 0 3px;color:var(--blue-900);line-height:1.15;}
.item-info .code{font-family:'Space Grotesk';font-size:9.5px;color:var(--ink-soft);}
.empty-msg{padding:40px 18px;text-align:center;color:var(--ink-soft);font-size:13px;}

/* detail screen */
.viewer-wrap{
  position:relative; height:300px; background:
    radial-gradient(circle at 70% 10%, rgba(46,125,201,.18), transparent 60%),
    repeating-linear-gradient(0deg, rgba(15,58,99,.07) 0 1px, transparent 1px 22px),
    repeating-linear-gradient(90deg, rgba(15,58,99,.07) 0 1px, transparent 1px 22px),
    var(--blue-100);
  touch-action:none;
}
.viewer-wrap canvas{width:100%!important;height:100%!important;display:block;}
.viewer-controls{position:absolute; right:12px; top:12px; display:flex; flex-direction:column; gap:7px;}
.vc-btn{
  width:34px;height:34px;border-radius:11px;background:rgba(255,255,255,.85);backdrop-filter:blur(4px);
  border:1px solid rgba(15,58,99,.12); display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blue-900);
}
.vc-btn svg{width:16px;height:16px;}
.viewer-hint{
  position:absolute;left:14px;bottom:12px;display:flex;align-items:center;gap:6px;
  font-family:'Space Grotesk';font-size:10px;color:var(--blue-800);background:rgba(255,255,255,.7);
  padding:5px 9px;border-radius:100px;
}
.viewer-hint svg{width:12px;height:12px;}
.detail-body{padding:20px 18px 100px;}
.detail-tags{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.tag{font-family:'Space Grotesk';font-size:10px;font-weight:600;padding:4px 9px;border-radius:7px;}
.tag-cat{background:var(--blue-100);color:var(--blue-800);}
.detail-title{font-family:'Hanken Grotesk';font-weight:800;font-size:27px;color:var(--blue-900);margin:0 0 4px;line-height:1.05;}
.detail-code{font-family:'Space Grotesk';font-size:12px;color:var(--ink-soft);margin-bottom:16px;}
.spec-row{display:flex;gap:10px;margin-bottom:18px;}
.spec-box{flex:1;background:var(--white);border:1px solid var(--line);border-radius:13px;padding:10px 8px;text-align:center;}
.spec-box svg{width:17px;height:17px;color:var(--secondary);margin-bottom:5px;}
.spec-box .v{font-family:'Hanken Grotesk';font-weight:700;font-size:15px;color:var(--blue-900);}
.spec-box .l{font-size:9.5px;color:var(--ink-soft);font-weight:600;}
.detail-desc{font-size:13.5px;line-height:1.65;color:var(--ink);margin-bottom:22px;}
.detail-desc b{color:var(--blue-900);}
.cta-stack{display:flex;flex-direction:column;gap:10px;}
.btn-primary{
  background:var(--blue-900); color:#fff; border:none; border-radius:14px; padding:15px 16px;
  font-family:'Work Sans'; font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; gap:8px;
  cursor:pointer;
}
.btn-primary svg{width:17px;height:17px;color:var(--primary);}
.btn-secondary{
  background:#fff; color:var(--blue-900); border:1.5px solid var(--blue-900); border-radius:14px; padding:14px 16px;
  font-family:'Work Sans'; font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
}
.btn-secondary svg{width:16px;height:16px;}
.btn-disabled{
  background:var(--paper-dim); color:#93a3b0; border:1.5px dashed #c3cfd8; border-radius:14px; padding:14px 16px;
  font-family:'Work Sans'; font-weight:700; font-size:12.5px; text-align:center;
}

/* guide screen */
#guide-canvas-wrap{position:relative; height:44vh; min-height:260px; background:var(--blue-950); touch-action:none; overflow:hidden;}
#guide-canvas-wrap canvas{width:100%!important;height:100%!important;display:block;}
.guide-progress{position:absolute; top:0; left:0; right:0; display:flex; gap:5px; padding:14px 16px 0;}
.guide-progress .seg{flex:1;height:4px;border-radius:4px;background:rgba(255,255,255,.18);overflow:hidden;}
.guide-progress .seg i{display:block;height:100%;width:0;background:var(--primary);border-radius:4px;transition:width .3s ease;}
.guide-topline{position:absolute; top:26px; left:16px; right:16px; display:flex; justify-content:space-between; align-items:center;}
.guide-steplabel{font-family:'Space Grotesk';font-size:10.5px;color:rgba(255,255,255,.65);letter-spacing:.05em;}
.ar-toggle{
  display:flex;align-items:center;gap:6px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.22);
  color:#fff; font-family:'Work Sans'; font-size:11px; font-weight:700; padding:6px 11px; border-radius:100px; cursor:pointer;
}
.ar-toggle.on{background:var(--primary);color:var(--blue-950);border-color:var(--primary);}
.ar-toggle svg{width:13px;height:13px;}
.guide-vc{position:absolute; right:12px; bottom:12px; display:flex; flex-direction:column; gap:7px;}
.guide-parttag{
  position:absolute; left:16px; bottom:14px; background:rgba(255,224,0,.95); color:var(--blue-950);
  font-family:'Space Grotesk'; font-size:10.5px; font-weight:700; padding:6px 10px; border-radius:9px; max-width:70%;
}
.guide-sheet{padding:20px 18px 110px;}
.guide-step-eyebrow{font-family:'Space Grotesk';font-size:10.5px;color:var(--secondary);font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.guide-step-title{font-family:'Hanken Grotesk';font-weight:800;font-size:23px;color:var(--blue-900);margin:5px 0 10px;line-height:1.1;}
.guide-step-text{font-size:13.5px;line-height:1.65;color:var(--ink);margin-bottom:18px;}
.parts-list{margin-bottom:8px;}
.parts-list h5{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin:0 0 9px;font-weight:700;}
.part-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
.part-row:last-child{border-bottom:none;}
.part-check{
  width:21px;height:21px;border-radius:7px;background:var(--primary);display:flex;align-items:center;justify-content:center;flex:0 0 auto;
}
.part-check svg{width:12px;height:12px;color:var(--blue-950);}
.part-row span{font-size:12.5px;font-weight:600;color:var(--ink);}
.guide-nav{
  position:absolute; left:0; right:0; bottom:0; background:linear-gradient(to top, var(--paper) 60%, rgba(243,246,249,0));
  padding:18px 18px calc(16px + env(safe-area-inset-bottom));
  display:flex; gap:10px;
}
.nav-step-btn{
  flex:1; border:none; border-radius:14px; padding:14px; font-family:'Work Sans'; font-weight:700; font-size:13.5px; cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.nav-step-btn svg{width:15px;height:15px;}
.nsb-prev{background:#fff;color:var(--blue-900);border:1.5px solid var(--line)!important;}
.nsb-next{background:var(--blue-900);color:#fff;}
.nsb-next svg{color:var(--primary);}
.nsb-finish{background:linear-gradient(90deg,var(--blue-700),var(--blue-900));color:#fff;}

/* AR overlay illustration */
.ar-scene-bg{position:absolute;inset:0;opacity:0;transition:opacity .35s ease;pointer-events:none;}
.ar-scene-bg.show{opacity:1;}
.ar-reticle{
  position:absolute; width:150px; height:150px; border:1.5px dashed rgba(255,224,0,.7); border-radius:16px;
  top:50%;left:50%;transform:translate(-50%,-50%); opacity:0; transition:opacity .3s ease;
}
.ar-reticle.show{opacity:1; animation:pulseReticle 2.4s ease-in-out infinite;}
@keyframes pulseReticle{0%,100%{border-color:rgba(255,224,0,.4);}50%{border-color:rgba(255,224,0,.9);}}
.ar-note{
  position:absolute; top:60px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.45);
  color:#fff; font-family:'Space Grotesk'; font-size:9.5px; padding:6px 12px; border-radius:100px;
  opacity:0; transition:opacity .3s ease; white-space:nowrap;
}
.ar-note.show{opacity:1;}

/* progress screen */
.ring-card{margin:16px 18px 20px; background:linear-gradient(150deg,var(--blue-800),var(--blue-950)); border-radius:20px; padding:22px; display:flex; align-items:center; gap:18px;}
.ring-card svg{flex:0 0 auto;}
.ring-info{color:#fff;}
.ring-info .big{font-family:'Hanken Grotesk';font-weight:800;font-size:26px;}
.ring-info .small{font-size:11.5px;color:rgba(255,255,255,.7);margin-top:3px;line-height:1.5;}
.module-row{
  margin:0 18px 12px; background:#fff; border:1px solid var(--line); border-radius:16px; padding:14px; display:flex; gap:12px; align-items:center; cursor:pointer;
}
.module-icon{width:44px;height:44px;border-radius:12px;background:var(--secondary-light,var(--blue-100));display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.module-icon svg{width:21px;height:21px;color:var(--blue-700);}
.module-body{flex:1;min-width:0;}
.module-body h4{font-family:'Hanken Grotesk';font-size:15px;margin:0 0 5px;color:var(--blue-900);}
.status-chip{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:6px;font-family:'Space Grotesk';display:inline-block;margin-top:6px;}
.st-done{background:#DCF3E3;color:#1C7A43;}
.st-progress{background:#FFF1CE;color:#9A6B00;}
.st-notstarted{background:var(--paper-dim);color:#7B8A97;}

/* profile screen */
.profile-card{margin:18px; background:linear-gradient(150deg,var(--blue-800),var(--blue-950)); border-radius:20px; padding:22px; color:#fff; display:flex; gap:14px; align-items:center;}
.avatar{width:56px;height:56px;border-radius:16px;background:var(--primary);color:var(--blue-950);display:flex;align-items:center;justify-content:center;font-family:'Hanken Grotesk';font-weight:800;font-size:20px;flex:0 0 auto;}
.profile-card h3{font-family:'Hanken Grotesk';font-size:18px;margin:0 0 3px;}
.profile-card p{font-size:11.5px;color:rgba(255,255,255,.7);margin:0;}
.settings-list{margin:0 18px;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;}
.settings-row{display:flex;align-items:center;gap:12px;padding:14px 15px;border-bottom:1px solid var(--line);cursor:pointer;}
.settings-row:last-child{border-bottom:none;}
.settings-row svg{width:18px;height:18px;color:var(--blue-700);}
.settings-row span{flex:1;font-size:13px;font-weight:600;}
.settings-row .chev{width:14px;height:14px;color:#B7C3CC;}

/* toast */
#toast{
  position:absolute; left:50%; bottom:86px; transform:translateX(-50%) translateY(20px); background:var(--blue-950); color:#fff;
  font-size:12.5px; font-weight:600; padding:11px 18px; border-radius:100px; opacity:0; pointer-events:none; transition:all .25s ease; z-index:50;
  display:flex; align-items:center; gap:8px; white-space:nowrap;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
#toast svg{width:14px;height:14px;color:var(--primary);}

@media (max-width:480px){
  body{padding:0;}
  #shell{border-radius:0;height:100vh;max-width:100%;}
}

/* ============================================================
   ROUTER STATE
   ============================================================ */
const state = { route:'home', params:{}, history:[] };

function go(route, params={}, push=true){
  if(push) state.history.push({route:state.route, params:state.params});
  state.route = route; state.params = params;
  render();
}
function goBack(){
  const prev = state.history.pop();
  if(prev){ state.route = prev.route; state.params = prev.params; render(); }
  else { go('home', {}, false); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.innerHTML = SMALL_ICON.bolt + '<span>'+msg+'</span>';
  t.classList.add('show');
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove('show'), 2200);
}

const Viewer3D = (function(){
  let renderer=null, scene=null, camera=null, group=null, raf=null, container=null;
  let sph = {theta:0.7, phi:1.05, radius:4.2};
  let dragging=false, lastX=0, lastY=0, autoRotate=true, idleTimer=0;

  let currentStep=1;
  let clock = 0;

  function makeMat(color, opts={}){ return new THREE.MeshStandardMaterial(Object.assign({color, roughness:.55, metalness:.18}, opts)); }
  const MAT = {
    steel: makeMat(0x5b6b7a, {metalness:.55, roughness:.35}),
    steelDark: makeMat(0x37424c, {metalness:.5, roughness:.4}),
    porcelain: makeMat(0xC9BBA6, {roughness:.45}),
    porcelainDark: makeMat(0x8a7a63, {roughness:.5}),
    concrete: makeMat(0x9a9a92, {roughness:.9, metalness:0}),
    ground: makeMat(0x4b5a3f, {roughness:1, metalness:0}),
    wood: makeMat(0x7a5a3a, {roughness:.8}),
    cableDark: makeMat(0x2b2f33, {roughness:.6}),
    alu: makeMat(0xB9C2C9, {metalness:.6, roughness:.35}),
    copper: makeMat(0xb5651d, {metalness:.5, roughness:.4}),
    green: makeMat(0x4f6a5e, {roughness:.5, metalness:.2}),
    highlight: makeMat(0xFFE000, {emissive:0x8a7500, emissiveIntensity:.6, roughness:.4, metalness:.3}),
  };

  function cyl(rt, rb, h, mat, seg=20){ return new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat); }
  function box(w,h,d,mat){ return new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat); }
  function ring(r, tube, mat, seg=24){ return new THREE.Mesh(new THREE.TorusGeometry(r, tube, 10, seg), mat); }
  function tagged(mesh, step){ mesh.userData.step = step; mesh.userData.baseColor = mesh.material.color ? mesh.material.color.getHex() : null; return mesh; }

  function poleStub(h=2.6){
    const g = new THREE.Group();
    const p = cyl(.09,.13,h,MAT.wood,12); p.position.y = h/2; g.add(p);
    g.userData.step = 0;
    return g;
  }

  function partInsulatorPost(scale=1){
    const g = new THREE.Group();
    const pin = cyl(.03,.03,.22,MAT.steel); pin.position.y=.11; g.add(pin);
    const d1 = cyl(.14,.17,.09,MAT.porcelain); d1.position.y=.26; g.add(d1);

    g.scale.setScalar(scale);
    return g;
  }

  function partFuseCutOut(){

  function partGuyHardware(){

  const SHAPE_BUILDERS = {
    crossArm(scene){
      const pole = poleStub(2.4); scene.add(pole);
      const clevis = partClamp(); clevis.scale.set(.7,.7,.7); clevis.position.set(0,2.2,0); tagged(clevis,0); scene.add(clevis);
      const arm = box(1.6,.09,.09,MAT.steel); arm.position.set(0,2.32,0); tagged(arm,0); scene.add(arm);
      const support = box(.55,.06,.06,MAT.steelDark); support.rotation.z=.6; support.position.set(-.35,2.05,0); tagged(support,0); scene.add(support);
      [-.55,0,.55].forEach(x=>{ const ins = partInsulatorPost(1.15); ins.position.set(x,2.36,0); tagged(ins,0); ins.traverse(o=>o.userData.step=0); scene.add(ins); });
    },
    clamp(scene){ const p = partClamp(); p.scale.set(1.6,1.6,1.6); scene.add(p); },
    insulatorPost(scene){ const base = box(.3,.05,.3,MAT.steel); base.position.y=-.02; scene.add(base); const ins = partInsulatorPost(2.1); ins.position.y=0; scene.add(ins); },
    insulatorPull(scene){ const p = partInsulatorPull(); p.scale.set(1.3,1.3,1.3); scene.add(p); },
    poleBand(scene){ const pole = poleStub(1.6); scene.add(pole); const band = partPoleBandOnly(); band.scale.set(1.6,1.6,1.6); band.position.y=1.0; scene.add(band); },
    arrester(scene){
      const pole = poleStub(2.2); scene.add(pole);
      const br = partBracket(); br.scale.set(1.2,1.2,1.2); br.position.set(.13,1.9,0); scene.add(br);
      const ar = partArresterBody(); ar.scale.set(1.3,1.3,1.3); ar.position.set(.32,1.55,0); scene.add(ar);
    },
    fuseCutOut(scene){ const pole = poleStub(2.2); scene.add(pole); const br = partBracket(); br.scale.set(1.1,1.1,1.1); br.position.set(.1,1.9,0); scene.add(br); const fc = partFuseCutOut(); fc.scale.set(1.6,1.6,1.6); fc.position.set(.35,1.8,0); scene.add(fc); },
    anchorBlock(scene){ const p = partAnchorBlock(); p.scale.set(1.5,1.5,1.5); scene.add(p); },
    guyWire(scene){
      const pole = poleStub(2.6); scene.add(pole);
      const anchor = partAnchorBlock(); anchor.scale.set(1.1,1.1,1.1); anchor.position.set(1.5,-1.3,0); scene.add(anchor);
      const wireLen = Math.sqrt(Math.pow(1.5,2)+Math.pow(2.6+1.15,2));
      const wire = cyl(.02,.02,wireLen,MAT.steelDark,8);
      wire.position.set(.75,1.3-.65,0);
      wire.rotation.z = Math.atan2(1.5, 2.6+1.15) - Math.PI/2;
      scene.add(wire);
      const buckle = partGuyHardware(); buckle.scale.set(1.2,1.2,1.2); buckle.position.set(.75,.9,0); buckle.rotation.z = wire.rotation.z; scene.add(buckle);
    },
    transformer(scene){ const p = partTransformer(); scene.add(p); },
    kubikel(scene){ const p = partKubikel(); scene.add(p); },
    conductor(scene){ const p = partConductor(); p.scale.set(1.6,1.6,1.6); scene.add(p); },
    connector(scene){ const p = partConnector(); p.scale.set(1.6,1.6,1.6); scene.add(p); },
    boltNut(scene){ const p = partBoltNut(); p.scale.set(1.8,1.8,1.8); scene.add(p); },
    washer(scene){ const p = partWasher(); p.scale.set(1.8,1.8,1.8); scene.add(p); },
  };

  function buildGuideScene(guideId, scene){
    if(guideId==='crossarm'){
      const pole = poleStub(2.4); scene.add(pole);
      const band = partPoleBandOnly(); band.scale.set(1.4,1.4,1.4); band.position.y=2.15; tagged(band,1); band.traverse(o=>o.userData.step=1); scene.add(band);
      const clevis = partClamp(); clevis.scale.set(.7,.7,.7); clevis.position.set(0,2.22,0); clevis.traverse(o=>o.userData.step=1); scene.add(clevis);
      const arm = box(1.6,.09,.09,MAT.steel); arm.position.set(0,2.34,0); tagged(arm,2); scene.add(arm);
      const support = box(.55,.06,.06,MAT.steelDark); support.rotation.z=.6; support.position.set(-.35,2.08,0); tagged(support,2); scene.add(support);
      [-.55,0,.55].forEach(x=>{ const ins = partInsulatorPost(1.15); ins.position.set(x,2.38,0); ins.traverse(o=>o.userData.step=3); scene.add(ins); });
      const conductor = partConductor(); conductor.scale.set(1.7,1.7,1.7); conductor.rotation.x=Math.PI/2; conductor.position.set(0,2.6,0); conductor.traverse(o=>o.userData.step=4); scene.add(conductor);
      return {focus:new THREE.Vector3(0,2.3,0), radius:3.1};
    }
    if(guideId==='guywire'){
      const pole = poleStub(2.6); scene.add(pole);
      const anchor = partAnchorBlock(); anchor.scale.set(1.15,1.15,1.15); anchor.position.set(1.5,-1.3,0); anchor.traverse(o=>o.userData.step=1); scene.add(anchor);
      const rodHw = partGuyHardware(); rodHw.scale.set(.9,.9,.9); rodHw.position.set(1.35,-.95,0); rodHw.rotation.z = -.9; rodHw.traverse(o=>o.userData.step=2); scene.add(rodHw);
      const wireLen = Math.sqrt(Math.pow(1.5,2)+Math.pow(2.6+1.15,2));
      const wireAngle = Math.atan2(1.5, 2.6+1.15) - Math.PI/2;
      const wireLow = cyl(.018,.018,wireLen*.55,MAT.steelDark,8); wireLow.position.set(1.0,-.35,0); wireLow.rotation.z = wireAngle; wireLow.traverse(o=>o.userData.step=3); scene.add(wireLow);
      const insG = ring(.08,.025,MAT.porcelain,16); insG.position.set(1.0,-.35,0); insG.rotation.x=Math.PI/2; insG.rotation.z=wireAngle; insG.traverse(o=>o.userData.step=3); scene.add(insG);
      const buckle = partGuyHardware(); buckle.scale.set(1.1,1.1,1.1); buckle.position.set(.68,.0,0); buckle.rotation.z=wireAngle; buckle.traverse(o=>o.userData.step=3); scene.add(buckle);
      const wireHigh = cyl(.02,.02,wireLen*.45,MAT.steel,8); wireHigh.position.set(.35,1.05,0); wireHigh.rotation.z = wireAngle; wireHigh.traverse(o=>o.userData.step=4); scene.add(wireHigh);
      return {focus:new THREE.Vector3(.6,0,0), radius:4.2};
    }
    if(guideId==='arrester'){
      const pole = poleStub(2.2); scene.add(pole);
      const br = partBracket(); br.scale.set(1.2,1.2,1.2); br.position.set(.13,1.9,0); br.traverse(o=>o.userData.step=1); scene.add(br);
      const ar = partArresterBody(); ar.scale.set(1.3,1.3,1.3); ar.position.set(.32,1.55,0); ar.traverse(o=>o.userData.step=2); scene.add(ar);
      const lineWire = cyl(.02,.02,.4,MAT.cableDark,8); lineWire.rotation.z=Math.PI/2.3; lineWire.position.set(.32,2.2,0); lineWire.traverse(o=>o.userData.step=3); scene.add(lineWire);
      const groundWire = cyl(.018,.018,1.7,MAT.cableDark,8); groundWire.position.set(.42,.85,0); groundWire.traverse(o=>o.userData.step=4); scene.add(groundWire);
      const groundRod = cyl(.03,.03,.4,MAT.steel,10); groundRod.position.set(.42,-1.15,0); groundRod.traverse(o=>o.userData.step=4); scene.add(groundRod);
      return {focus:new THREE.Vector3(.2,1.4,0), radius:3.4};
    }
  }

  function init(containerEl, opts){
    destroy();
    container = containerEl;
    mode = opts.mode || 'detail';
    currentStep = opts.step || 1;
    scene = new THREE.Scene();
    const w = container.clientWidth, h = container.clientHeight;
    camera = new THREE.PerspectiveCamera(38, w/h, .1, 100);
    renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(w,h);
    renderer.setClearColor(0x000000,0);
    container.innerHTML=''; container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff,.65));
    const dl = new THREE.DirectionalLight(0xffffff,.9); dl.position.set(3,5,4); scene.add(dl);
    const dl2 = new THREE.DirectionalLight(0x6fa8dc,.35); dl2.position.set(-4,2,-3); scene.add(dl2);

    const grid = new THREE.GridHelper(6,24,0x2E7DC9,0x1D63A6);
    grid.material.opacity=.35; grid.material.transparent=true; grid.position.y=-1.18;
    scene.add(grid);

    group = new THREE.Group(); scene.add(group);
    let focusTarget = new THREE.Vector3(0,.9,0), radius = 4.2;
    if(mode==='guide'){
      const info = buildGuideScene(opts.guideId, group);
      if(info){ focusTarget = info.focus; radius = info.radius; }
    } else {
      const fn = SHAPE_BUILDERS[opts.shape];
      if(fn) fn(group);
      const b = new THREE.Box3().setFromObject(group);
      const c = b.getCenter(new THREE.Vector3()); const size = b.getSize(new THREE.Vector3());
      focusTarget = c; radius = Math.max(size.x,size.y,size.z)*2.1+1.4;
    }
    sph = {theta:.65, phi:1.05, radius};
    camera.userData.target = focusTarget;

    applyStepVisibility();
    updateCamera();
    attachControls();
    animate();
    new ResizeObserver(()=>onResize()).observe(container);
  }

  function applyStepVisibility(){
    if(mode!=='guide'){ group.traverse(o=>{ if(o.isMesh){ o.visible=true; if(o.userData.baseColor!=null) o.material.emissiveIntensity = o.material.emissiveIntensity; } }); return; }
    group.traverse(o=>{
      if(!o.isMesh) return;
      const st = o.userData.step ?? 0;
      o.visible = st <= currentStep;
      if(st === currentStep && st>0){
        if(!o.userData._origMat) o.userData._origMat = o.material;
        o.material = MAT.highlight;
      } else {
        if(o.userData._origMat) o.material = o.userData._origMat;
      }
    });
  }

  function setStep(n){ currentStep = n; applyStepVisibility(); }

  function updateCamera(){
    const t = camera.userData.target || new THREE.Vector3(0,.9,0);
    const {theta, phi, radius} = sph;
    camera.position.set(
      t.x + radius*Math.sin(phi)*Math.sin(theta),
      t.y + radius*Math.cos(phi),
      t.z + radius*Math.sin(phi)*Math.cos(theta)
    );
    camera.lookAt(t);
  }

  function onResize(){
    if(!container||!renderer) return;
    const w = container.clientWidth, h = container.clientHeight;
    if(w<10||h<10) return;
    camera.aspect = w/h; camera.updateProjectionMatrix();
    renderer.setSize(w,h);
  }

  function attachControls(){
    const el = renderer.domElement;
    el.style.touchAction='none';
    el.addEventListener('pointerdown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; autoRotate=false; el.setPointerCapture(e.pointerId); });
    el.addEventListener('pointermove', e=>{
      if(!dragging) return;
      const dx=e.clientX-lastX, dy=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY;
      sph.theta -= dx*.008; sph.phi = Math.min(1.45, Math.max(.35, sph.phi - dy*.008));
      idleTimer = 0;
    });
    window.addEventListener('pointerup', ()=>{ dragging=false; });
    el.addEventListener('wheel', e=>{ e.preventDefault(); sph.radius = Math.min(9, Math.max(1.4, sph.radius + e.deltaY*.0025*sph.radius)); autoRotate=false; idleTimer=0; }, {passive:false});
  }

  function zoom(dir){ sph.radius = Math.min(9, Math.max(1.4, sph.radius + dir*.5)); autoRotate=false; }
  function resetView(){ autoRotate=true; sph.theta=.65; sph.phi=1.05; }

  function animate(){
    raf = requestAnimationFrame(animate);
    clock += 0.016;
    if(autoRotate && !dragging){ sph.theta += .0035; }
    else { idleTimer += 1; if(idleTimer > 240){ autoRotate = true; } }
    updateCamera();
    if(mode==='guide'){
      group.traverse(o=>{ if(o.isMesh && o.userData.step===currentStep && o.userData.step>0){ const s = 1+Math.sin(clock*3)*.035; o.scale.setScalar(s); } });
    }
    renderer.render(scene, camera);
  }

  function destroy(){
    if(raf) cancelAnimationFrame(raf);
    if(renderer){ renderer.dispose(); }
    renderer=null; scene=null; camera=null; group=null; container=null;
    dragging=false; autoRotate=true; idleTimer=0;
  }

  return {init, destroy, setStep, zoom, resetView};
})();

    <div class="cat-grid">
      ${CATEGORIES.map(c=>`
        <div class="cat-card" data-cat="${c.id}">
          <div class="cat-icon" style="background:${c.color};color:#fff;">${ICONS[c.icon]}</div>
          <h3>${c.name}</h3>
          <p>${c.desc}</p>
          <div class="cat-count">${ITEMS.filter(i=>i.cat===c.id).length} material</div>
        </div>`).join('')}
    </div>

    <div class="px section-row">
      <div class="section-title">Lanjutkan Belajar</div>
      <span class="link-more" id="seeAllProgress">Lihat semua</span>
    </div>
    ${continueCardHtml()}
  `;
  document.getElementById('homeSearch').onclick = ()=>go('catalog',{query:''});
  document.getElementById('seeAllProgress').onclick = ()=>go('progress');
  document.querySelectorAll('.cat-card').forEach(el=>el.onclick=()=>go('catalog',{cat:el.dataset.cat}));
  document.getElementById('continueCardTarget')?.addEventListener('click', ()=>{
    const gid = mostRecentGuide();
    go('guide',{guideId:gid, step:1});
  });

  Viewer3D.init(document.getElementById('heroCanvas'), {mode:'detail', shape:'crossArm'});
}

function mostRecentGuide(){
  const entries = Object.entries(progressState).filter(([k,v])=>v<100);
  if(entries.length===0) return Object.keys(GUIDES)[0];
  entries.sort((a,b)=>b[1]-a[1]);
  return entries[0][0];
}
function continueCardHtml(){
  const gid = mostRecentGuide();
  const g = GUIDES[gid];
  const pct = progressState[gid];
  return `
  <div class="continue-card" id="continueCardTarget">
    <div class="continue-thumb">${SMALL_ICON.layers}</div>
    <div class="continue-body">
      <div class="lbl">${g.code} · ${g.level}</div>
      <h4>${g.title}</h4>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="continue-pct">${pct}% selesai · ${g.duration}</div>
    </div>
    <div class="continue-arrow">${SMALL_ICON.arrowR}</div>
  </div>`;
}

/* ---------------- CATALOG ---------------- */
function renderCatalog(){
  const p = state.params || {};
  const activeCat = p.cat || 'all';
  const query = (p.query || '').toLowerCase();
  setTopbar({title:'Katalog Material', eyebrow:'16 MATERIAL SUTM/SUTR', showBack:true});

  const chips = [{id:'all', name:'Semua'}, ...CATEGORIES];
  let filtered = ITEMS.filter(i=>{
    const catOk = activeCat==='all' || i.cat===activeCat;
    const qOk = !query || i.name.toLowerCase().includes(query) || i.code.toLowerCase().includes(query);
    return catOk && qOk;
  });

  screenEl().innerHTML = `
    <div class="search-bar" style="margin-top:16px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="catSearchInput" placeholder="Cari nama atau kode material..." value="${p.query||''}">
    </div>
    <div class="chip-row">
      ${chips.map(c=>`<div class="filter-chip ${c.id===activeCat?'active':''}" data-cat="${c.id}">${c.name}</div>`).join('')}
    </div>
    <div class="item-grid">
      ${filtered.length ? filtered.map(cardHtml).join('') : ''}
    </div>
    ${filtered.length ? '' : '<div class="empty-msg">Material tidak ditemukan. Coba kata kunci lain.</div>'}
  `;
  document.querySelectorAll('.filter-chip').forEach(el=>el.onclick=()=>go('catalog',{cat:el.dataset.cat, query:p.query||''}, false));
  document.querySelectorAll('.item-card').forEach(el=>el.onclick=()=>go('detail',{id:el.dataset.item}));
  const input = document.getElementById('catSearchInput');
  input.oninput = ()=>{ state.params = {cat:activeCat, query:input.value}; renderCatalogGridOnly(); };
}
function renderCatalogGridOnly(){
  const p = state.params;
  const activeCat = p.cat||'all'; const query=(p.query||'').toLowerCase();
  const filtered = ITEMS.filter(i=>{
    const catOk = activeCat==='all' || i.cat===activeCat;
    const qOk = !query || i.name.toLowerCase().includes(query) || i.code.toLowerCase().includes(query);
    return catOk && qOk;
  });
  const grid = document.querySelector('.item-grid');
  grid.innerHTML = filtered.map(cardHtml).join('');
  document.querySelectorAll('.item-card').forEach(el=>el.onclick=()=>go('detail',{id:el.dataset.item}));
  let empty = document.querySelector('.empty-msg');
  if(!filtered.length && !empty){ grid.insertAdjacentHTML('afterend', '<div class="empty-msg">Material tidak ditemukan. Coba kata kunci lain.</div>'); }
  if(filtered.length && empty){ empty.remove(); }
}

/* ---------------- DETAIL ---------------- */
function renderDetail(){
  const item = ITEMS.find(i=>i.id===state.params.id);
  if(!item){ go('catalog',{},false); return; }
  const cat = CATEGORIES.find(c=>c.id===item.cat);
  setTopbar({title:item.name, eyebrow:cat.name.toUpperCase(), showBack:true});

  const hasGuide = !!item.guide;
  screenEl().innerHTML = `
    <div class="viewer-wrap" id="detailCanvas">
      <div class="viewer-controls">
        <div class="vc-btn" id="zoomIn">${SMALL_ICON.zoomin}</div>
        <div class="vc-btn" id="zoomOut">${SMALL_ICON.zoomout}</div>
        <div class="vc-btn" id="resetV">${SMALL_ICON.reset}</div>
      </div>
      <div class="viewer-hint">${SMALL_ICON.hand}<span>Seret · cubit untuk zoom</span></div>
    </div>
    <div class="detail-body">
      <div class="detail-tags">
        <div class="tag tag-cat">${cat.name}</div>
        <div class="tag" style="background:${item.level==='TR'?'#FDE9CE':'#DCE9F7'};color:${item.level==='TR'?'#9A5A00':'var(--blue-800)'}">Tegangan ${item.level}</div>
      </div>
      <div class="detail-title">${item.name}</div>
      <div class="detail-code">Kode Referensi · ${item.code}</div>
      <div class="spec-row">
        <div class="spec-box">${SMALL_ICON.layers}<div class="v">${item.pieces}</div><div class="l">Bagian</div></div>
        <div class="spec-box">${SMALL_ICON.book}<div class="v">${item.level}</div><div class="l">Level Tegangan</div></div>
        <div class="spec-box">${SMALL_ICON.clock}<div class="v">${hasGuide?'~8m':'—'}</div><div class="l">Baca Panduan</div></div>
      </div>
      <div class="detail-desc">${item.blurb}</div>
      <div class="cta-stack">
        ${hasGuide ? `<button class="btn-primary" id="startGuideBtn">${SMALL_ICON.play}Mulai Panduan Instalasi 3D</button>` : `<div class="btn-disabled">Panduan langkah demi langkah untuk material ini segera hadir</div>`}
        <button class="btn-secondary" id="arModeBtn">${SMALL_ICON.ar}Lihat Konsep Mode AR</button>
      </div>
    </div>
  `;
  Viewer3D.init(document.getElementById('detailCanvas'), {mode:'detail', shape:item.shape});
  document.getElementById('zoomIn').onclick = ()=>Viewer3D.zoom(-.5);
  document.getElementById('zoomOut').onclick = ()=>Viewer3D.zoom(.5);
  document.getElementById('resetV').onclick = ()=>Viewer3D.resetView();
  if(hasGuide) document.getElementById('startGuideBtn').onclick = ()=>go('guide',{guideId:item.guide, step:1});
  document.getElementById('arModeBtn').onclick = ()=>{
    if(hasGuide){ go('guide',{guideId:item.guide, step:1, ar:true}); }
    else { showToast('Mode AR tersedia di modul panduan bertahap'); }
  };
}

/* ---------------- GUIDE ---------------- */
function renderGuide(){
  const gid = state.params.guideId;
  const guide = GUIDES[gid];
  if(!guide){ go('home',{},false); return; }
  let step = state.params.step || 1;
  const total = guide.steps.length;
  setTopbar({title:guide.title, eyebrow:guide.code+' · '+guide.level, showBack:true});

  screenEl().innerHTML = `
    <div id="guide-canvas-wrap">
      <div class="ar-scene-bg" id="arBg"></div>
      <div class="ar-reticle" id="arReticle"></div>
      <div class="ar-note" id="arNote">MODE AR (DEMO) · KAMERA DISIMULASIKAN</div>
      <div id="guideCanvasHolder" style="position:absolute;inset:0;"></div>
      <div class="guide-progress">
        ${Array.from({length:total}).map((_,i)=>`<div class="seg"><i style="width:${i<step?'100':'0'}%"></i></div>`).join('')}
      </div>
      <div class="guide-topline">
        <div class="guide-steplabel">LANGKAH ${step} / ${total}</div>
        <div class="ar-toggle" id="arToggle">${SMALL_ICON.ar}<span>Mode AR</span></div>
      </div>
      <div class="guide-parttag" id="partTag">${guide.steps[step-1].parts[0]}</div>
      <div class="guide-vc">
        <div class="vc-btn" id="gZoomIn" style="background:rgba(255,255,255,.9)">${SMALL_ICON.zoomin}</div>
        <div class="vc-btn" id="gZoomOut" style="background:rgba(255,255,255,.9)">${SMALL_ICON.zoomout}</div>
        <div class="vc-btn" id="gReset" style="background:rgba(255,255,255,.9)">${SMALL_ICON.reset}</div>
      </div>
    </div>
    <div class="guide-sheet">
      <div class="guide-step-eyebrow">Langkah ${step} dari ${total}</div>
      <div class="guide-step-title">${guide.steps[step-1].title}</div>
      <div class="guide-step-text">${guide.steps[step-1].text}</div>
      <div class="parts-list">
        <h5>Material Digunakan</h5>
        ${guide.steps[step-1].parts.map(p=>`<div class="part-row"><div class="part-check">${SMALL_ICON.check}</div><span>${p}</span></div>`).join('')}
      </div>
    </div>
    <div class="guide-nav">
      ${step>1 ? `<button class="nav-step-btn nsb-prev" id="prevStep">${SMALL_ICON.arrowL}Sebelumnya</button>` : `<button class="nav-step-btn nsb-prev" id="exitGuide">Keluar</button>`}
      ${step<total ? `<button class="nav-step-btn nsb-next" id="nextStep">Selanjutnya${SMALL_ICON.arrowR}</button>` : `<button class="nav-step-btn nsb-finish" id="finishGuide">${SMALL_ICON.check}Tandai Selesai</button>`}
    </div>
  `;

  Viewer3D.init(document.getElementById('guideCanvasHolder'), {mode:'guide', guideId:gid, step});
  document.getElementById('gZoomIn').onclick=()=>Viewer3D.zoom(-.5);
  document.getElementById('gZoomOut').onclick=()=>Viewer3D.zoom(.5);
  document.getElementById('gReset').onclick=()=>Viewer3D.resetView();

  let arOn = !!state.params.ar;
  const applyAr = ()=>{
    document.getElementById('arToggle').classList.toggle('on', arOn);
    document.getElementById('arBg').classList.toggle('show', arOn);
    document.getElementById('arReticle').classList.toggle('show', arOn);
    document.getElementById('arNote').classList.toggle('show', arOn);
    document.getElementById('guide-canvas-wrap').style.background = arOn ? '' : 'var(--blue-950)';
    if(arOn) drawArBackground();
  };
  applyAr();
  document.getElementById('arToggle').onclick = ()=>{ arOn=!arOn; applyAr(); showToast(arOn?'Mode AR (demo) aktif':'Mode AR nonaktif'); };

  if(step>1) document.getElementById('prevStep').onclick = ()=>go('guide',{guideId:gid, step:step-1, ar:arOn}, false);
  if(step<total) document.getElementById('nextStep').onclick = ()=>go('guide',{guideId:gid, step:step+1, ar:arOn}, false);
  if(step===1) document.getElementById('exitGuide').onclick = ()=>goBack();
  if(step===total) document.getElementById('finishGuide').onclick = ()=>{
    progressState[gid]=100; showToast('Modul ditandai selesai — kerja bagus!'); go('progress');
  };
  if(step>1 && progressState[gid] < Math.round((step/total)*100)) progressState[gid] = Math.round((step/total)*100);
}

function drawArBackground(){
  const el = document.getElementById('arBg');
  el.innerHTML = `<svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;display:block;">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#274a68"/><stop offset="100%" stop-color="#0e2438"/>
      </linearGradient>
      <linearGradient id="grnd" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2c3a2e"/><stop offset="100%" stop-color="#141d16"/>
      </linearGradient>
    </defs>
    <rect width="400" height="210" fill="url(#sky)"/>
    <rect y="210" width="400" height="90" fill="url(#grnd)"/>
    <circle cx="335" cy="45" r="26" fill="#3a5a78" opacity=".55"/>
    <path d="M0 215 Q60 200 130 214 T260 210 T400 216" stroke="#0e2438" stroke-width="3" fill="none" opacity=".4"/>
  </svg>`;
}

/* ---------------- PROGRESS ---------------- */
function renderProgress(){
  setTopbar({title:'Progres Belajar', eyebrow:'MODUL & SERTIFIKASI'});
  const vals = Object.values(progressState);
  const doneCount = vals.filter(v=>v>=100).length;
  const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const R=30, C=2*Math.PI*R;
  screenEl().innerHTML = `
    <div class="ring-card">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle cx="36" cy="36" r="${R}" stroke="rgba(255,255,255,.18)" stroke-width="7" fill="none"/>
        <circle cx="36" cy="36" r="${R}" stroke="#FFE000" stroke-width="7" fill="none" stroke-linecap="round"
          stroke-dasharray="${C}" stroke-dashoffset="${C-(C*avg/100)}" transform="rotate(-90 36 36)"/>
        <text x="36" y="41" text-anchor="middle" font-family="Hanken Grotesk" font-weight="800" font-size="18" fill="#fff">${avg}%</text>
      </svg>
      <div class="ring-info">
        <div class="big">${doneCount} dari ${vals.length} modul selesai</div>
        <div class="small">Terus lengkapi panduan instalasi 3D untuk menaikkan skor kesiapan lapangan Anda.</div>
      </div>
    </div>
    <div class="px section-row"><div class="section-title">Semua Modul</div></div>
    ${Object.entries(GUIDES).map(([gid,g])=>{
      const pct = progressState[gid];
      const status = pct>=100 ? {c:'st-done',t:'Selesai'} : pct>0 ? {c:'st-progress',t:'Sedang Berjalan'} : {c:'st-notstarted',t:'Belum Dimulai'};
      return `<div class="module-row" data-guide="${gid}">
        <div class="module-icon">${SMALL_ICON.layers}</div>
        <div class="module-body">
          <h4>${g.title}</h4>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="status-chip ${status.c}">${status.t} · ${pct}%</div>
        </div>
        <div class="continue-arrow">${SMALL_ICON.arrowR}</div>
      </div>`;
    }).join('')}
    <div style="height:8px"></div>
  `;
  document.querySelectorAll('.module-row').forEach(el=>el.onclick=()=>{
    const gid = el.dataset.guide; const pct = progressState[gid];
    const total = GUIDES[gid].steps.length;
    const startStep = pct>=100 ? 1 : Math.max(1, Math.round((pct/100)*total));
    go('guide',{guideId:gid, step:startStep});
  });
}

/* ---------------- PROFILE ---------------- */
function renderProfile(){
  setTopbar({title:'Profil', eyebrow:'AKUN SAYA'});
  screenEl().innerHTML = `
    <div class="profile-card">
      <div class="avatar">KP</div>
      <div>
        <h3>Karyawan PLN</h3>
        <p>Unit Pelaksana Distribusi · Teknisi Jaringan</p>
      </div>
    </div>
    <div class="settings-list">
      <div class="settings-row">${SMALL_ICON.book}<span>Tentang Modul Pelatihan</span>${SMALL_ICON.arrowR}</div>
      <div class="settings-row">${SMALL_ICON.ar}<span>Panduan Penggunaan Mode AR</span>${SMALL_ICON.arrowR}</div>
      <div class="settings-row">${SMALL_ICON.help}<span>Bantuan & Pusat Dukungan</span>${SMALL_ICON.arrowR}</div>
      <div class="settings-row">${SMALL_ICON.info}<span>Tentang Aplikasi</span>${SMALL_ICON.arrowR}</div>
      <div class="settings-row" style="color:var(--red)">${SMALL_ICON.logout}<span style="color:var(--red)">Keluar</span></div>
    </div>
  `;
  document.querySelectorAll('.settings-row').forEach(el=>el.onclick=()=>showToast('Fitur ini adalah bagian dari konsep prototipe'));
}

/* ============================================================
   MAIN RENDER / INIT
   ============================================================ */
function render(){
  if(state.route!=='home' && state.route!=='detail' && state.route!=='guide') Viewer3D.destroy();
  document.getElementById('screen').scrollTop = 0;
  if(state.route==='home') renderHome();
  else if(state.route==='catalog') renderCatalog();
  else if(state.route==='detail') renderDetail();
  else if(state.route==='guide') renderGuide();
  else if(state.route==='progress') renderProgress();
  else if(state.route==='profile') renderProfile();
  renderBottomNav();
}

document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const r = btn.dataset.route;
    state.history = [];
    go(r, {}, false);
  });
});
document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('searchBtn').addEventListener('click', ()=>go('catalog',{query:''}));

render();
</script>
</body>
</html>
